```html
<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OFT News</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
}

header{
    background:#fff;
    padding:15px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
    position:sticky;
    top:0;
    z-index:100;
}

.logo{
    display:flex;
    align-items:center;
    gap:10px;
}

.logo img{
    height:45px;
}

.logo h1{
    font-size:24px;
}

.breaking{
    background:red;
    color:white;
    padding:10px;
    overflow:hidden;
    white-space:nowrap;
}

.breaking span{
    display:inline-block;
    animation:scroll 30s linear infinite;
}

@keyframes scroll{
    from{transform:translateX(100%)}
    to{transform:translateX(-100%)}
}

.container{
    width:95%;
    max-width:1300px;
    margin:auto;
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.content{
    padding:15px;
}

.category{
    color:red;
    font-size:13px;
    font-weight:bold;
}

.title{
    margin-top:8px;
    font-size:18px;
    font-weight:bold;
    line-height:1.4;
}

.time{
    color:#666;
    font-size:13px;
    margin-top:10px;
}

.desc{
    margin-top:10px;
    color:#444;
    line-height:1.6;
}

.read-btn{
    display:inline-block;
    margin-top:12px;
    text-decoration:none;
    background:red;
    color:white;
    padding:8px 14px;
    border-radius:5px;
}

.loading{
    text-align:center;
    font-size:20px;
    margin-top:50px;
}
</style>
</head>

<body>

<header>
    <div class="logo">
        <img src="https://ik.imagekit.io/ofttools/oftnewslogo.png">
        <h1>OFT News</h1>
    </div>
</header>

<div class="breaking">
    <span id="ticker">Loading latest headlines...</span>
</div>

<div class="container">
    <div id="newsContainer" class="grid"></div>
</div>

<script>

const FALLBACK_IMAGE =
"https://ik.imagekit.io/ofttools/oftnewslogo.png";

const SOURCES = [
"https://news-api-seven-bice.vercel.app/jamuna.tv",
"https://news-api-seven-bice.vercel.app/itvbd.com",
"https://news-api-seven-bice.vercel.app/somoynews.tv",
"https://news-api-seven-bice.vercel.app/atnnewstv.com",
"https://news-api-seven-bice.vercel.app/channel24bd.tv"
];

async function fetchAllNews(){

    const allNews=[];

    try{

        const responses = await Promise.all(
            SOURCES.map(url =>
                fetch(url).then(res => res.json())
            )
        );

        responses.forEach(data=>{

            if(data.news){

                data.news.forEach(item=>{

                    allNews.push({
                        ...item,
                        source:data.source || ""
                    });

                });

            }

        });

        const uniqueNews = allNews.filter(
            (item,index,self)=>
            index === self.findIndex(
                n=>n.title===item.title
            )
        );

        uniqueNews.sort((a,b)=>{

            const dateA=new Date(a.time || 0);
            const dateB=new Date(b.time || 0);

            return dateB-dateA;

        });

        renderNews(uniqueNews);

    }catch(error){

        console.error(error);

        document.getElementById("newsContainer").innerHTML=
        "<h2>News loading failed.</h2>";

    }

}

function renderNews(news){

    const container =
    document.getElementById("newsContainer");

    container.innerHTML="";

    let headlines=[];

    news.forEach(item=>{

        headlines.push(item.title);

        const card=document.createElement("div");

        card.className="card";

        card.innerHTML=`
        <img
        src="${item.image || FALLBACK_IMAGE}"
        onerror="this.src='${FALLBACK_IMAGE}'"
        >

        <div class="content">

            <div class="category">
            ${item.category || "News"}
            </div>

            <div class="title">
            ${item.title}
            </div>

            <div class="time">
            ${item.time || ""}
            </div>

            <div class="desc">
            ${(item.subtitle || item.body || "")
            .substring(0,150)}...
            </div>

            <a
            href="${item.url}"
            target="_blank"
            class="read-btn">
            বিস্তারিত পড়ুন
            </a>

        </div>
        `;

        container.appendChild(card);

    });

    document.getElementById("ticker").innerText =
    headlines.slice(0,20).join(" | ");

}

fetchAllNews();

setInterval(fetchAllNews,3600000);

</script>

</body>
</html>
```
